model:
  sft_model_path: "./outputs/sft/merged"
  max_seq_length: 1024

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "float16"
  bnb_4bit_use_double_quant: true

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

dpo:
  beta: 0.1
  loss_type: "sigmoid"
  max_prompt_length: 512
  max_length: 1024

training:
  output_dir: "./outputs/dpo"
  num_train_epochs: 1
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  gradient_checkpointing: true
  learning_rate: 5.0e-5
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  fp16: true
  logging_steps: 10
  eval_steps: 50
  save_steps: 50
  save_total_limit: 2
  report_to: "wandb"
  run_name: "alignforge-dpo"

dataset:
  name: "Anthropic/hh-rlhf"
  max_samples: 5000
